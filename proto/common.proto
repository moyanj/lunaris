syntax = "proto3";

package lunaris.common;

message Envelope {
  enum MessageType {
    TASK = 0;
    TASK_RESULT = 1;
    CONTROL_COMMAND = 2;
    NODE_STATUS = 3;
    NODE_REGISTRATION = 4;
    NODE_REGISTRATION_REPLY = 5;
    UNREGISTER_NODE = 6;
    CREATE_TASK = 7;
    UNSUBSCRIBE_TASK = 8;
  }

  MessageType type = 1;
  bytes payload = 2;
}

enum LuaVersion {
  LUA_54 = 0;
  LUA_51 = 1;
  LUA_52 = 2;
  LUA_53 = 3;
  LUA_JIT_20 = 4;
  LUA_JIT_21 = 5;
}

message TaskResult {
  string task_id = 1; // 对应任务ID
  string result = 2;  // 结果（JSON格式）
  string stdout = 3;  // 标准输出
  string stderr = 4;  // 错误输出
  double time = 5;    // 运行时间（毫秒）
  bool succeeded = 6; // 是否成功
}