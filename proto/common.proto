syntax = "proto3";

package lunaris.common;

message Envelope {
  enum MessageType {
    TASK = 0;
    TASK_RESULT = 1;
    CONTROL_COMMAND = 2;
    NODE_STATUS = 3;
    NODE_REGISTRATION = 4;
    NODE_REGISTRATION_REPLY = 5;
    UNREGISTER_NODE = 6;
    CREATE_TASK = 7;
    UNSUBSCRIBE_TASK = 8;
    TASK_CREATED = 9;
    TASK_CREATE_FAILED = 10;
  }

  MessageType type = 1;
  bytes payload = 2;
  bool compressed = 3;
}

message TaskResult {
  string task_id = 1; // 对应任务ID
  string result = 2;  // 结果（JSON格式）
  bytes stdout = 3;   // 标准输出
  bytes stderr = 4;   // 错误输出
  double time = 5;    // 运行时间（毫秒）
  bool succeeded = 6; // 是否成功
}

message WasiEnv {
  map<string, string> env = 1; // 环境变量
  repeated string args = 2;    // 参数
}

message ExecutionLimits {
  uint64 max_fuel = 1;         // 最大 fuel，0 表示未设置
  uint64 max_memory_bytes = 2; // 最大线性内存，0 表示未设置
  uint64 max_module_bytes = 3; // 最大 Wasm 模块大小，0 表示未设置
}
