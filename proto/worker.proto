syntax = "proto3";

package lunaris.worker;

import "common.proto";

// ========== 核心任务格式 ==========
message Task {
  string task_id = 1;
  bytes wasm_module = 2;       // WASM模块
  string args = 3;             // 输入参数（JSON格式）
  string entry = 4;            // 函数名
  uint32 priority = 5;         // 优先级
  common.WasiEnv wasi_env = 6; // WASI环境设置
  common.ExecutionLimits execution_limits = 7; // 执行资源限制
  uint32 attempt = 8;          // 当前派发对应的尝试次数
}

message TaskAccepted {
  string task_id = 1;
  string node_id = 2;
  uint32 attempt = 3;
}

// ========== 精简控制命令 ==========
message ControlCommand {
  CommandType type = 1; // 命令类型
  string data = 2;      // 附加数据（如心跳间隔、关机前任务保留策略）
  enum CommandType {
    HEARTBEAT = 0;
    SHUTDOWN = 1;
    CANCEL_TASK = 2;
    SET_DRAIN = 3;
  }
}

// ========== 节点状态 ==========
message NodeStatus {
  enum NodeState {
    IDLE = 0; // 空闲（可接收任务）
    BUSY = 1; // 忙碌（任务满载）
  }
  string node_id = 1;      // 节点ID
  NodeState status = 2;    // 节点状态
  uint32 current_task = 3; // 当前正在执行的任务数
}

// ========== 节点注册消息 ==========
message NodeRegistration {
  string name = 1;            // 主机名
  string arch = 2;            // 处理器架构
  uint32 max_concurrency = 3; // 最大并发任务数
  uint64 memory_size = 4;     // 总内存容量（MB）
  string token = 5;
}

message NodeRegistrationReply {
  string node_id = 1; // 节点ID
}

message UnregisterNode {
  string node_id = 1; // 节点ID
}
